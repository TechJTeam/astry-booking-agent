# Reference copy of the deploy-target compose file for the Dev VM. deploy/dev.azure-pipelines.yml
# writes this exact content to /u01/astry/booking-agent/docker-compose.yml on every deploy (via
# the "Write .env and docker-compose.yml" step) — nothing needs to be copied manually. Keep this
# file in sync with that heredoc if you change one, update the other.
#
# Requires (one-time, same host as astry-pos-be):
#   docker network create shared-network   # if not already created by astry-pos-be/DB-Agent
name: booking-agent

services:
  booking-agent:
    image: linkwave.azurecr.io/astry/booking-agent-dev:latest
    container_name: astry-booking-agent
    env_file: .env
    ports:
      - '8200:8200'
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - shared-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8200/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  shared-network:
    external: true
